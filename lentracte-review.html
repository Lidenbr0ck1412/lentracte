<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E8253A;
    --red-dark: #c01e2e;
    --black: #0a0a0a;
    --dark: #111111;
    --dark2: #181818;
    --white: #ffffff;
    --grey: #888888;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }
  a { text-decoration: none; color: inherit; }

  /* GRAIN */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: .35;
  }

  /* NAVBAR */
  nav {
    background: var(--dark);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 70px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 2px solid var(--red);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--white); }
  .logo span { color: var(--red); }
  .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
  .nav-links a { font-weight: 400; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--white); transition: color .2s; }
  .nav-links a:hover { color: var(--red); }
  .nav-back {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--grey);
    transition: color .2s; cursor: pointer;
  }
  .nav-back:hover { color: var(--white); }
  .nav-back svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* HERO */
  .hero {
    position: relative; height: 92vh; min-height: 560px;
    overflow: hidden; display: flex; align-items: flex-end;
  }
  .hero-bg { position: absolute; inset: 0; }
  .hero-bg img {
    width: 100%; height: 100%; object-fit: cover; object-position: center 20%; display: block;
    animation: heroBreath 8s ease-in-out infinite alternate;
  }
  .hero-bg-color {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a0505 0%, #0a0a0a 100%);
  }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,1) 100%),
      linear-gradient(to right, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.15) 55%, transparent 100%);
  }
  @keyframes heroBreath {
    from { filter: brightness(1) saturate(1); }
    to   { filter: brightness(1.08) saturate(1.1); }
  }

  /* Poster */
  .hero-poster-zone {
    position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
    width: 340px; height: 485px;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 0 50px rgba(232,37,58,.25), 0 0 100px rgba(232,37,58,.1);
  }
  .hero-poster-zone img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .hero-content {
    position: relative; z-index: 2;
    padding: 0 48px 56px; max-width: 680px;

  @keyframes heroReveal {

    display: inline-flex; align-items: center; gap: 8px;
    background: var(--red); padding: 5px 14px; border-radius: 3px;
    font-size: 11px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase;
    margin-bottom: 20px;

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 9vw, 110px);
    letter-spacing: 4px; line-height: .9; color: var(--white);
    text-shadow: 0 4px 40px rgba(0,0,0,.8);
  }
  .hero-title .year {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(18px, 2.5vw, 28px); font-weight: 300;
    color: var(--red); letter-spacing: 4px; display: block; margin-top: 8px;

  .hero-tagline {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: clamp(15px, 2vw, 20px); color: rgba(255,255,255,.65);
    margin-top: 18px; line-height: 1.5;

  .hero-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 28px; }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--grey); text-transform: uppercase; }
  .meta-value { font-size: 13px; font-weight: 600; color: var(--white); }

  .hero-scroll {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;

  .article-intro {
    font-family: 'Playfair Display', serif;
    font-size: clamp(19px, 2.5vw, 24px); line-height: 1.75;
    color: rgba(255,255,255,.9); margin-bottom: 40px; font-style: italic;

  .article-body p { font-size: 15px; line-height: 1.9; color: rgba(255,255,255,.72); margin-bottom: 26px; }
  .article-body p strong { color: var(--white); font-weight: 700; }
  .article-body p em { color: rgba(255,255,255,.85); font-style: italic; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 3px; color: var(--white);
    margin: 48px 0 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, var(--red), transparent);
  }

  .pull-quote {
    border-left: 4px solid var(--red); padding: 20px 28px; margin: 40px 0;
    background: rgba(232,37,58,.05); border-radius: 0 8px 8px 0;

  .pull-quote p {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 2.2vw, 22px); font-style: italic;
    color: rgba(255,255,255,.9) !important; line-height: 1.6; margin: 0 !important;

  .anecdote-card {
    background: var(--dark2); border: 1px solid #2a2a2a;
    border-left: 4px solid var(--red);
    border-radius: 0 12px 12px 0;
    padding: 28px 28px 28px 24px; margin: 40px 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  .anecdote-icon { font-size: 22px; line-height: 1; }
  .anecdote-label { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px; color: var(--red); text-transform: uppercase; }
  .anecdote-text { font-size: 14px; line-height: 1.85; color: rgba(255,255,255,.72); margin: 0 !important; }
  .anecdote-text strong { color: var(--white); }

  hr.separateur {
    border: none; border-top: 1px solid #222;
    margin: 40px 0;
  }

  /* STAR RATING */
  .rating-section {
    text-align: center; padding: 60px 0 40px;
    border-top: 1px solid #1e1e1e; margin-top: 40px;
  }
  .rating-label { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 4px; color: var(--grey); text-transform: uppercase; margin-bottom: 6px; }
  .rating-title { font-family: 'Playfair Display', serif; font-size: clamp(22px, 3vw, 30px); font-style: italic; color: var(--white); margin-bottom: 36px; }
  .stars-container { display: flex; justify-content: center; gap: 18px; margin-bottom: 20px; }
  .star-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: default; }
  .star { width: 52px; height: 52px; }

  .rating-verdict { font-family: 'Playfair Display', serif; font-style: italic; font-size: 18px; color: rgba(255,255,255,.6); }

  .related-section { background: var(--dark); padding: 64px 32px; margin-top: 0; }
  .related-inner { max-width: 1100px; margin: 0 auto; }
  .related-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
  .related-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; color: var(--white); white-space: nowrap; }
  .related-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--red), transparent); }
  .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .related-card {
    border-radius: 12px; overflow: hidden; aspect-ratio: 16/9;
    position: relative; display: block;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .related-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(232,37,58,.2); }
  .related-card-bg { position: absolute; inset: 0; }
  .related-card-bg img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.5); transition: filter .3s; }
  .related-card:hover .related-card-bg img { filter: brightness(0.65); }
  .related-card-overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: flex-end; padding: 20px;
    background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 60%);

  .related-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--white); }
  .related-card-sub { font-size: 11px; color: var(--red); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* FOOTER */
  footer { background: var(--black); border-top: 1px solid #1a1a1a; padding: 32px; text-align: center; }
  footer p { font-size: 12px; color: var(--grey); letter-spacing: 1px; }

  /* REVEAL */
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .6s ease, transform .6s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* CHARGEMENT / ERREUR */
  .loading-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; gap: 20px; color: var(--grey);
  }
  .loading-frames { display: flex; gap: 4px; }
  .loading-frames span {
    width: 6px; height: 10px; background: #333; border-radius: 1px;
    animation: loadFrame 1s ease-in-out infinite;
  }
  .loading-frames span:nth-child(1) { animation-delay: 0s; }
  .loading-frames span:nth-child(2) { animation-delay: 0.1s; }
  .loading-frames span:nth-child(3) { animation-delay: 0.2s; }
  .loading-frames span:nth-child(4) { animation-delay: 0.3s; }
  .loading-frames span:nth-child(5) { animation-delay: 0.4s; }
  @keyframes loadFrame {
    0%,100% { background: #333; }
    50% { background: var(--red); transform: scaleY(1.4); }
  }
  .loading-text { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 4px; text-transform: uppercase; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .hero-poster-zone { display: none; }
    .hero-content { padding: 0 24px 48px; max-width: 100%; }
    .related-grid { grid-template-columns: 1fr; }
    nav { padding: 0 16px; }
  }
</style>

<script>

// ── PARSER MARKDOWN ───────────────────────────────────────────────
// Transforme le champ `contenu` en HTML selon les règles du projet :
// ## titre  → <div class="section-title">
// > citation → <div class="pull-quote">
// 💡 anecdote → <div class="anecdote-card">
// **gras**   → <strong>
// *italique* → <em>
// ---        → <hr class="separateur">
// paragraphes normaux → <p>

function parseMarkdown(texte) {
  if (!texte) return '';

  const lignes = texte.split('\n');
  let html = '';
  let tampon = []; // accumule les lignes d'un paragraphe courant

  function viderTampon() {
    if (tampon.length === 0) return;
    const contenu = tampon.join(' ').trim();
    if (contenu) html += `<p class="reveal">${contenu}</p>\n`;
    tampon = [];
  }

  function inlineFormat(str) {
    return str
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  for (let i = 0; i < lignes.length; i++) {
    const ligne = lignes[i];

    // Ligne vide → fin de paragraphe
    if (ligne.trim() === '') {
      viderTampon();
      continue;
    }

    // ## Titre de section
    if (ligne.startsWith('## ')) {
      viderTampon();
      const titre = inlineFormat(ligne.slice(3).trim());
      html += `<div class="section-title reveal">${titre}</div>\n`;
      continue;
    }

    // --- Séparateur
    if (ligne.trim() === '---') {
      viderTampon();
      html += `<hr class="separateur">\n`;
      continue;
    }

    // > Citation / pull-quote
    if (ligne.startsWith('> ')) {
      viderTampon();
      const citation = inlineFormat(ligne.slice(2).trim());
      html += `<div class="pull-quote reveal"><p>${citation}</p></div>\n`;
      continue;
    }

    // 💡 Anecdote
    if (ligne.startsWith('💡 ')) {
      viderTampon();
      const texteAnecdote = inlineFormat(ligne.slice(3).trim());
      html += `
<div class="anecdote-card reveal">
  <div class="anecdote-icon">💡</div>
  <div class="anecdote-label">LE SAVIEZ-VOUS ?</div>
  <p class="anecdote-text">${texteAnecdote}</p>
</div>\n`;
      continue;
    }

    // Ligne normale → accumulation dans le paragraphe
    tampon.push(inlineFormat(ligne.trim()));
  }

  viderTampon();
  return html;
}

// ── ÉTOILES ───────────────────────────────────────────────────────
// note est sur 10, on affiche sur 5
function renderEtoiles(note) {
  const sur5 = Math.round((note / 10) * 5);
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const classe = i <= sur5 ? 'filled' : 'empty';
    html += `
    <div class="star-wrap">
      <div class="star ${classe}">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <span class="star-number">${i}</span>
    </div>`;
  }
  return html;
}

  const imgBanner = film.banner || film.img || '';
  const imgPoster = film.img || '';

  // Score sur 5
  const sur5 = film.note ? Math.round((film.note / 10) * 5) : null;

  const html = `
<!-- HERO -->
<section class="hero">
  <div class="hero-bg">
    ${imgBanner
      ? `<img src="${imgBanner}" alt="${film.title}" />`
      : `<div class="hero-bg-color"></div>`}

    <img src="${imgPoster}" alt="Affiche ${film.title}" />

  <div class="hero-content">

      ${film.year ? `<span class="year">${film.year}</span>` : ''}

    ${film.sub ? `<p class="hero-tagline">${film.sub}</p>` : ''}

      ${film.realisateur ? `

      <div class="meta-item">
        <span class="meta-label">Durée</span>
        <span class="meta-value">${film.duree}</span>
      </div>` : ''}
      ${film.note != null ? `
      <div class="meta-item">
        <span class="meta-label">Note</span>
        <span class="meta-value red">${sur5} / 5 ★</span>
      </div>` : ''}
      ${film.link ? `
      <div class="meta-item">

        <span class="meta-value"><a href="${film.link}" target="_blank" rel="noopener" style="color:var(--red)">Lien ↗</a></span>
      </div>` : ''}
    </div>
  </div>

  <div class="hero-scroll" onclick="document.querySelector('.article-wrapper').scrollIntoView({behavior:'smooth'})">
    <span>LIRE</span>
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
  </div>
</section>

<!-- ARTICLE -->
<div class="article-wrapper">

  ${film.verdict ? `<p class="article-intro reveal">${film.verdict}</p>` : ''}

  <div class="article-body">
    ${parseMarkdown(film.contenu)}
  </div>

  ${film.note != null ? `
  <!-- SCORE FINAL -->
  <div class="rating-section reveal">
    <div class="rating-label">Notre verdict</div>
    <div class="rating-title">${film.title}${film.year ? ` (${film.year})` : ''}</div>
    <div class="stars-container">
      ${renderEtoiles(film.note)}
    </div>
    <div class="rating-score">${sur5}<span>/5</span></div>
    ${film.verdict ? `<div class="rating-verdict">${film.verdict}</div>` : ''}
  </div>` : ''}

  <!-- PARTAGE -->

  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  // Bouton copier
  const copyBtn = document.getElementById('copyBtn');
  if (copyBtn) {
    copyBtn.addEventListener('click', function() {
      navigator.clipboard?.writeText(location.href);

// ── CHARGEMENT ────────────────────────────────────────────────────
async function charger() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('page-content').innerHTML = `
      <div class="loading-state">
        <p class="loading-text" style="color:#E8253A">Aucun film spécifié dans l'URL</p>
        <a href="index.html" style="color:#888;font-size:13px;margin-top:8px;">← Retour à l'accueil</a>
      </div>`;
    return;
  }

  try {
    const { data, error } = await db
      .from('reviews')
      .select('*')
      .eq('id', id)
      .single();

    if (error || !data) throw error || new Error('Film introuvable');

    construirePage(data);

  } catch (err) {
    console.error('Erreur Supabase :', err);
    document.getElementById('page-content').innerHTML = `
      <div class="loading-state">
        <p class="loading-text" style="color:#E8253A">Erreur : ${err.message}</p>
        <a href="index.html" style="color:#888;font-size:13px;margin-top:8px;">← Retour à l'accueil</a>
      </div>`;
  }
}

charger();
</script>
