/* ─────────────────────────────────────────────
   MARKDOWN PARSER
   Supporte :
   ## Titre section      → <div class="section-title">
   > Citation            → <div class="pull-quote">
   💡 Le saviez-vous ?   → <div class="anecdote-card"> (ligne qui commence par un emoji)
   **gras**              → <strong>
   *italique*            → <em>
   Paragraphes normaux   → <p>
   Première section = article-intro (Playfair italique)
───────────────────────────────────────────── */
function parseMarkdown(md) {
  if (!md) return '';

  const lines = md.split('\n');
  const blocks = [];
  let currentParagraph = [];
  let isFirst = true;

  function flushParagraph() {
    if (currentParagraph.length === 0) return;
    const text = currentParagraph.join(' ').trim();
    if (!text) { currentParagraph = []; return; }
    const html = inlineMarkdown(text);
    if (isFirst) {
      // Le premier paragraphe = intro en Playfair italique
      // On retire les * d'enrobage si Notion les a ajoutés (*texte*)
      const cleaned = html.replace(/^\*(.+)\*$/, '$1');
      blocks.push(`<p class="article-intro reveal">${cleaned}</p>`);
      isFirst = false;
    } else {
      // Paragraphe en italique seul (entouré de *...*) → pull-quote
      if (/^\*[^*].+[^*]\*$/.test(text)) {
        const quoteText = inlineMarkdown(text.replace(/^\*(.+)\*$/, '$1'));
        blocks.push(`
          <div class="pull-quote reveal">
            <p>${quoteText}</p>
            <cite>L'Entracte</cite>
          </div>`);
      } else {
        blocks.push(`<p class="reveal">${html}</p>`);
      }
    }
    currentParagraph = [];
  }

  function inlineMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Ligne vide → flush paragraphe
    if (line.trim() === '') {
      flushParagraph();
      continue;
    }

    // # TITRE (format Notion : "# **TITRE**" ou "# TITRE")
    if (/^#{1,3} /.test(line)) {
      flushParagraph();
      isFirst = false;
      // Retire les # et le gras éventuel autour du titre
      let title = line.replace(/^#{1,3} /, '').trim();
      title = title.replace(/^\*\*(.+)\*\*$/, '$1');
      blocks.push(`<div class="section-title reveal">${title}</div>`);
      continue;
    }

    // > Citation (pull-quote explicite)
    if (line.startsWith('> ')) {
      flushParagraph();
      isFirst = false;
      let quoteLines = [line.replace('> ', '')];
      while (i + 1 < lines.length && lines[i + 1].startsWith('> ')) {
        i++;
        quoteLines.push(lines[i].replace('> ', ''));
      }
      const quoteText = inlineMarkdown(quoteLines.join(' '));
      blocks.push(`
        <div class="pull-quote reveal">
          <p>${quoteText}</p>
          <cite>L'Entracte</cite>
        </div>`);
      continue;
    }

    // Ligne qui commence par un emoji → anecdote card
    if (/^[\u{1F300}-\u{1FAFF}✨💡🎬🎥📽🎞🔍⚡🏆💬🎭🎦]/u.test(line.trim())) {
      flushParagraph();
      isFirst = false;
      const emoji = [...line.trim()][0];
      let label = line.trim().slice([...line.trim()][0].length).trim();
      let contentLines = [];
      while (i + 1 < lines.length && lines[i + 1].trim() !== '' && !/^#{1,3} /.test(lines[i + 1]) && !lines[i + 1].startsWith('> ')) {
        i++;
        contentLines.push(lines[i]);
      }
      const contentText = inlineMarkdown(contentLines.join(' '));
      blocks.push(`
        <div class="anecdote-card reveal">
          <div class="anecdote-icon">${emoji}</div>
          ${label ? `<div class="anecdote-label">${label}</div>` : ''}
          <p class="anecdote-text">${contentText}</p>
        </div>`);
      continue;
    }

    // Ligne normale → accumulée dans paragraphe
    currentParagraph.push(line);
  }
  flushParagraph();

  // Wrap dans article-body (sauf l'intro)
  let inBody = false;
  let result = '';
  for (const block of blocks) {
    const isIntro = block.includes('article-intro');
    if (!inBody && !isIntro) {
      result += '<div class="article-body">';
      inBody = true;
    }
    result += block;
  }
  if (inBody) result += '</div>';
  return result;
}

function buildStars(note) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= note ? 'filled' : 'empty';
    html += `
      <div class="star-wrap">
        <div class="star ${filled}">
          <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <span class="star-number">${i}</span>
      </div>`;
  }
  return html;
}

/* ─────────────────────────────────────────────
   RENDER ARTICLE
───────────────────────────────────────────── */
function renderStills(stills) {
  if (!stills) return '';
  const imgs = stills.split(',').map(s => s.trim()).filter(Boolean);
  if (!imgs.length) return '';
  return `
  <div class="stills-grid reveal">
    ${imgs.map((src, i) => `
    <div class="still">
      <img src="${src}" alt="Still ${i+1}">
    </div>`).join('')}
  </div>`;
}

function renderTrailer(url) {
  if (!url) return '';
  return `
  <div class="trailer-section reveal">
    <div class="section-title">BANDE ANNONCE</div>
    <div class="trailer-wrap">
      <iframe src="${url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>`;
}

function renderArticle(r) {
  // Injecter les stills après le premier paragraphe (article-intro)
  let bodyHtml = parseMarkdown(r.contenu || LOREM_IPSUM);

  // Insérer les stills juste après l'article-intro
  if (r.stills) {
    const stillsHtml = renderStills(r.stills);
    bodyHtml = bodyHtml.replace('</p>\n<div class="article-body">', `</p>\n${stillsHtml}\n<div class="article-body">`);
    // fallback si pas d'article-body séparé
    if (!bodyHtml.includes(stillsHtml)) {
      const firstP = bodyHtml.indexOf('</p>');
      if (firstP !== -1) {
        bodyHtml = bodyHtml.slice(0, firstP + 4) + stillsHtml + bodyHtml.slice(firstP + 4);
      }
    }
  }

  // Insérer la bande annonce juste avant la note (après le dernier paragraphe du corps)
  const trailerHtml = renderTrailer(r.trailer);
  const verdict = r.verdict || 'À voir absolument';

  return `
  <div class="article-wrapper" id="article-top">
    ${bodyHtml}

    ${trailerHtml}

    <!-- NOTE -->
    <div class="rating-section reveal">
      <div class="rating-label">Notre verdict</div>
      <div class="rating-title">${verdict}</div>
      <div class="stars-container">
        ${buildStars(r.note || 0)}
      </div>
      <div class="rating-score">${r.note || '—'}<span> / 5</span></div>
    </div>

    <!-- PARTAGE -->
    <div class="share-bar reveal">
      <span class="share-label">Partager</span>
      <button class="share-btn" onclick="shareTwitter()">

        X / Twitter
      </button>
      <button class="share-btn" onclick="shareFacebook()">
        <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </button>
      <button class="share-btn" id="copyBtn">
        <svg viewBox="0 0 24 24"><path d="M13.5 3H12H8C6.4 3 5 4.4 5 6v15l7-3 7 3V6c0-1.6-1.4-3-3-3h-2.5z"/></svg>
        Copier le lien

}

/* ─────────────────────────────────────────────
   RENDER RELATED
───────────────────────────────────────────── */
function renderRelated(reviews, currentId) {
  const others = reviews.filter(r => r.id !== currentId).slice(0, 3);
  if (others.length === 0) return '';

  const cards = others.map(r => {
    const bg = r.img
      ? `<img src="${r.img}" alt="${r.title}" class="related-card-bg" style="width:100%;height:100%;object-fit:cover;display:block;">`
      : `<div class="related-card-bg" style="height:100%;background:linear-gradient(135deg,${r.color||'#1a0505'},${r.color2||'#3a1010'})"></div>`;
    return `
      <a href="review.html?id=${r.id}" class="related-card">
        ${bg}
        <div class="related-card-overlay">
          <div class="related-card-title">${r.title}</div>
          <div class="related-card-sub">${r.year || ''} · Critique</div>
        </div>
      </a>`;
  }).join('');

  return `
  <section class="related-section">
    <div class="related-inner">
      <div class="related-header"><h3>À lire aussi</h3></div>
      <div class="related-grid">${cards}</div>
    </div>
  </section>`;
}

## CE QUI FONCTIONNE

Dès les premières images, le réalisateur installe un climat oppressant, presque médiéval. Les décors baignent dans une lumière glauque de fin du monde. **On ne nous vend pas un film de genre — on nous plonge dans une tragédie morale.**

💡 LE SAVIEZ-VOUS ?
Le réalisateur porte ce projet depuis plus de *vingt ans*. Il avait écrit une première version du scénario en 2000, mais le studio avait refusé de financer un film qu'il jugeait trop sombre. C'est finalement grâce à une plateforme de streaming qu'il a pu réaliser sa vision sans compromis.

## CE QUI PÈCHE

Le film n'est pas sans défauts. Le troisième acte, qui cherche à tout résoudre trop proprement, trahit légèrement la noirceur des deux premières heures. Certains personnages secondaires manquent de profondeur — on croit davantage à leur détresse qu'à leur complexité.

On pourra aussi reprocher au film quelques longueurs dans son deuxième acte. Certes nécessaire, cette partie aurait gagné à être resserrée d'une vingtaine de minutes pour maintenir la tension dramatique intacte.

Et pourtant. Quand le film prononce ses derniers mots dans le silence, **quelque chose se brise.** On nous rappelle que les grandes histoires ont toujours été des histoires d'abandon.`;

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
async function init() {
  // Lire l'ID depuis l'URL (?id=X)
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  // Charger toutes les reviews (pour le related)
  const allRes = await fetch(`${SUPABASE_URL}/rest/v1/reviews?select=id,title,year,img,color,color2&order=id.asc`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const allReviews = await allRes.json();

  // Charger la review courante
  let review = null;
  if (id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}&select=*`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    review = data[0] || null;
  }

  // Fallback : si aucun id ou review introuvable, prendre la première
  if (!review && allReviews.length > 0) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${allReviews[0].id}&select=*`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    review = data[0];
  }

  if (!review) {
    document.getElementById('hero-container').innerHTML = '<div class="loading-hero"><p>Review introuvable.</p></div>';
    return;
  }

  // Mettre à jour le titre de la page
  document.title = `${review.title} (${review.year}) – Critique • L'Entracte`;

  // Injecter
  document.getElementById('hero-container').innerHTML = renderHero(review);
  document.getElementById('article-container').innerHTML = renderArticle(review);
  document.getElementById('related-container').innerHTML = renderRelated(allReviews, review.id);

  // Reveal observer
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Copy button
  const copyBtn = document.getElementById('copyBtn');
  if (copyBtn) {
    copyBtn.addEventListener('click', function() {
      navigator.clipboard?.writeText(location.href);
      this.innerHTML = '<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:currentColor"><path d="M20 6L9 17l-5-5"/></svg> Copié !';
      setTimeout(() => {
        this.innerHTML = '<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:currentColor"><path d="M13.5 3H12H8C6.4 3 5 4.4 5 6v15l7-3 7 3V6c0-1.6-1.4-3-3-3h-2.5z"/></svg> Copier le lien';
      }, 2000);
    });
  }
}

function toggleNav() {
  const nav = document.getElementById('mobileNav');
  nav.classList.toggle('open');

  if (nav.classList.contains('open')) {
    spans[0].style.transform = 'rotate(45deg) translate(5px,5px)';
    spans[1].style.opacity = '0';
    spans[2].style.transform = 'rotate(-45deg) translate(5px,-5px)';
  } else {
    spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
  }
}
