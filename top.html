<script>
const SUPABASE_URL = 'https://jnlfejbcpudkmcphsfej.supabase.co';

/* ─── MARKDOWN INLINE ─── */
function inlineMd(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

function parseMentions(text) {
  if (!text) return '';
  return inlineMd(text);
}

function parseContenu(text) {
  if (!text) return '';
  return text.split(/\n\n+/).map(p => `<p>${inlineMd(p.trim())}</p>`).join('');
}

/* ─── RENDER HERO ─── */
function renderHero(top) {
  return `
  <section class="hero">
    <div class="hero-bg">
      <img src="${top.banner || ''}" alt="${top.title}">
      <div class="hero-bg-gradient"></div>
    </div>
    <div class="hero-content">
      <div class="hero-category"><span class="dot"></span>TOP</div>
      <h1 class="hero-title">${top.title}</h1>
      ${top.subtitle ? `<p class="hero-subtitle">${top.subtitle}</p>` : ''}
      <div class="hero-meta">
        ${top.annee ? `<div class="hero-meta-item"><span class="hero-meta-label">Année</span><span class="hero-meta-value">${top.annee}</span></div>` : ''}
        <div class="hero-meta-item"><span class="hero-meta-label">Films</span><span class="hero-meta-value">10 sélectionnés</span></div>
      </div>
    </div>
  </section>`;
}

/* ─── RENDER MENTIONS ─── */
function renderMentions(top) {
  if (!top.mentions) return '';
  return `
  <div class="mentions-section">
    <div class="mentions-inner">
      <div class="mentions-header">
        <span class="mentions-label"><span class="dot"></span>MENTIONS HONORABLES</span>
      </div>
      <p class="mentions-text">${parseMentions(top.mentions)}</p>
    </div>
  </div>`;
}

/* ─── RENDER FILMS 10→2 ─── */
function renderFilms(films) {
  // Tous sauf le n°1, triés de 10 à 2
  const list = films.filter(f => f.position > 1).sort((a, b) => b.position - a.position);
  return `
  <div class="films-list">
    ${list.map(f => `
    <div class="film-entry">
      <div class="film-number">${f.position}</div>
      <div class="film-poster-wrap">
        ${f.img ? `<img src="${f.img}" alt="${f.title}">` : `<div class="film-poster-placeholder" style="background:linear-gradient(135deg,#1a0505,#3a1010)"></div>`}
        ${f.review_id ? `<div class="film-note-badge">Notre critique</div>` : ''}
      </div>
      <div class="film-content">
        <div class="film-title">${f.title}</div>
        <div class="film-meta">
          ${f.realisateur ? `<span class="film-meta-item">${f.realisateur}</span><span class="film-meta-sep">·</span>` : ''}
          ${f.genre ? `<span class="film-meta-item">${f.genre}</span><span class="film-meta-sep">·</span>` : ''}
          ${f.annee ? `<span class="film-meta-item red">${f.annee}</span>` : ''}
        </div>
        <div class="film-text">${parseContenu(f.contenu)}</div>
        ${f.review_id ? `
        <a href="review.html?id=${f.review_id}" class="film-review-link">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Lire notre critique
        </a>` : ''}
      </div>
    </div>`).join('')}
  </div>`;
}

/* ─── RENDER N°1 ─── */
function renderFilmOne(f, top) {
  return `
  <div class="film-number-one">
    <div class="film-one-bg">
      <img src="${f.img || top.banner || ''}" alt="${f.title}">
      <div class="film-one-gradient"></div>
    </div>
    <div class="film-one-inner">
      <div class="film-one-crown">
        <div class="film-one-label"><span class="dot"></span>FILM DE L'ANNÉE</div>
        <div class="film-one-num">1</div>
      </div>
      <div class="film-one-body">
        <div class="film-one-poster">
          ${f.img ? `<img src="${f.img}" alt="${f.title}">` : ''}
        </div>
        <div class="film-one-content">
          <div class="film-one-title">${f.title}</div>
          <div class="film-meta" style="margin-bottom:24px;">
            ${f.realisateur ? `<span class="film-meta-item">${f.realisateur}</span><span class="film-meta-sep">·</span>` : ''}
            ${f.genre ? `<span class="film-meta-item">${f.genre}</span><span class="film-meta-sep">·</span>` : ''}
            ${f.annee ? `<span class="film-meta-item red">${f.annee}</span>` : ''}
          </div>
          <div class="film-text">${parseContenu(f.contenu)}</div>
          ${f.review_id ? `
          <a href="review.html?id=${f.review_id}" class="film-review-link" style="margin-top:24px;">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            Lire notre critique
          </a>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

/* ─── SHARE BAR ─── */
function renderShare() {
  return `
  <div class="share-bar">
    <span class="share-label">Partager</span>
    <button class="share-btn" onclick="shareTwitter()">
      <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      X / Twitter
    </button>
    <button class="share-btn" onclick="shareFacebook()">
      <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </button>
    <button class="share-btn" id="copyBtn">
      <svg viewBox="0 0 24 24"><path d="M13.5 3H12H8C6.4 3 5 4.4 5 6v15l7-3 7 3V6c0-1.6-1.4-3-3-3h-2.5z"/></svg>
      Copier le lien
    </button>
  </div>`;
}

/* ─── INIT ─── */
async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || 1;

  // Charger le top
  const topRes = await fetch(`${SUPABASE_URL}/rest/v1/tops?id=eq.${id}&select=*`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const topData = await topRes.json();
  const top = topData[0];
  if (!top) {
    document.getElementById('hero-container').innerHTML = '<div class="loading-hero"><p>Top introuvable.</p></div>';
    return;
  }

  // Charger les films du top
  const filmsRes = await fetch(`${SUPABASE_URL}/rest/v1/tops_films?top_id=eq.${id}&select=*&order=position.asc`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const films = await filmsRes.json();

  const filmOne = films.find(f => f.position === 1);

  // Mettre à jour le titre
  document.title = `${top.title} • L'Entracte`;

  // Injecter
  document.getElementById('hero-container').innerHTML = renderHero(top);

  let html = '';
  if (top.intro) {
    html += `<div class="top-intro"><p>${top.intro}</p></div>`;
  }
  html += renderMentions(top);
  html += renderFilms(films);
  if (filmOne) html += renderFilmOne(filmOne, top);
  html += renderShare();

  document.getElementById('content-container').innerHTML = html;

  // Reveal observer
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.film-entry, .film-number-one').forEach(el => observer.observe(el));

  // Copy btn
  const copyBtn = document.getElementById('copyBtn');
  if (copyBtn) {
    copyBtn.addEventListener('click', function() {
      navigator.clipboard?.writeText(location.href);
      this.innerHTML = '<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:currentColor"><path d="M20 6L9 17l-5-5"/></svg> Copié !';
      setTimeout(() => {
        this.innerHTML = '<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:currentColor"><path d="M13.5 3H12H8C6.4 3 5 4.4 5 6v15l7-3 7 3V6c0-1.6-1.4-3-3-3h-2.5z"/></svg> Copier le lien';
      }, 2000);
    });
  }
}

function toggleNav() {
  const nav = document.getElementById('mobileNav');
  nav.classList.toggle('open');
  const spans = document.getElementById('burger').querySelectorAll('span');
  if (nav.classList.contains('open')) {
    spans[0].style.transform = 'rotate(45deg) translate(5px,5px)';
    spans[1].style.opacity = '0';
    spans[2].style.transform = 'rotate(-45deg) translate(5px,-5px)';
  } else {
    spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
  }
}

function shareTwitter() {
  window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(document.title)}`, '_blank');
}
function shareFacebook() {
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`, '_blank');
}

init();
</script>
